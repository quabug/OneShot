name: dotnet-unit-test

on:
  push:
    branches: [ main, v4 ]
  pull_request:
    branches: [ main, v4 ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Build
      run: dotnet build
    - name: Test OneShot.Tests
      run: dotnet run --project tests/OneShot.Tests
    - name: Test OneShot.Generator.Tests
      run: dotnet run --project tests/OneShot.Generator.Tests

  nativeaot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Publish NativeAOT
      run: dotnet publish tests/OneShot.Tests -c Release
    - name: Run NativeAOT binary
      continue-on-error: true
      run: ./tests/OneShot.Tests/bin/Release/net10.0/linux-x64/publish/OneShot.Tests
